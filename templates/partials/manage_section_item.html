{{define "partials/manage_section_item"}}
<div
    id="manage-section-{{.Section.ID}}"
    class="p-3 bg-stone-50 dark:bg-stone-700 rounded-lg border border-stone-100 dark:border-stone-600 flex items-center gap-3"
    :class="{'bg-red-50 dark:bg-red-900/30 border-red-200 dark:border-red-800': selectMode && selectedSections.includes({{.Section.ID}})}"
    @click="if(selectMode) toggleSection({{.Section.ID}})"
    x-data="{ editing: false, editName: '{{.Section.Name | js}}' }"
>
    <!-- Select checkbox -->
    <template x-if="selectMode">
        <input
            type="checkbox"
            :checked="selectedSections.includes({{.Section.ID}})"
            @click.stop="toggleSection({{.Section.ID}})"
            class="w-4 h-4 rounded border-stone-300 dark:border-stone-500 text-pink-400 focus:ring-pink-400 dark:bg-stone-600"
        >
    </template>

    <!-- Section name (view mode) -->
    <span
        x-show="!editing"
        @dblclick="if(!selectMode) { editing = true; editName = '{{.Section.Name | js}}'; $nextTick(() => $refs.editInput{{.Section.ID}}.focus()) }"
        class="flex-1 font-medium text-stone-700 dark:text-stone-200 text-sm cursor-default"
    >{{.Section.Name}}</span>

    <!-- Section name (edit mode) -->
    <form
        x-show="editing"
        x-cloak
        @submit.prevent="$data.markLocalAction('section_updated'); fetch('/sections/{{.Section.ID}}', {method: 'PUT', headers: {'Content-Type': 'application/x-www-form-urlencoded'}, body: 'name=' + encodeURIComponent(editName)}).then(() => { editing = false; $data.refreshManageSectionsModal(); $data.refreshSection({{.Section.ID}}); $data.refreshSectionSelectsFromServer() })"
        class="flex-1"
    >
        <input
            x-ref="editInput{{.Section.ID}}"
            x-model="editName"
            @keydown.escape="editing = false; editName = '{{.Section.Name | js}}'"
            @blur="if(editName.trim() && editName !== '{{.Section.Name | js}}') { $data.markLocalAction('section_updated'); fetch('/sections/{{.Section.ID}}', {method: 'PUT', headers: {'Content-Type': 'application/x-www-form-urlencoded'}, body: 'name=' + encodeURIComponent(editName)}).then(() => { editing = false; $data.refreshManageSectionsModal(); $data.refreshSection({{.Section.ID}}); $data.refreshSectionSelectsFromServer() }) } else { editing = false; editName = '{{.Section.Name | js}}' }"
            @click.stop
            maxlength="100"
            class="w-full border border-pink-300 dark:border-pink-500 rounded px-2 py-0.5 text-sm focus:outline-none focus:ring-2 focus:ring-pink-400 focus:border-transparent bg-white dark:bg-stone-600 text-stone-800 dark:text-stone-100"
        >
    </form>

    <!-- Actions -->
    <template x-if="!selectMode">
        <div class="flex items-center gap-1">
            <!-- Edit -->
            <button
                @click.stop="editing = true; editName = '{{.Section.Name | js}}'; $nextTick(() => $refs.editInput{{.Section.ID}}.focus())"
                x-show="!editing"
                class="p-1.5 rounded-md hover:bg-stone-200 dark:hover:bg-stone-600 text-stone-400 dark:text-stone-500 hover:text-stone-600 dark:hover:text-stone-300"
                :title="t('common.edit')"
            >
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                </svg>
            </button>

            <!-- Move up -->
            <button
                @click.stop="$data.markLocalAction('sections_reordered'); fetch('/sections/{{.Section.ID}}/move-up', {method: 'POST'}).then(() => { $data.refreshManageSectionsModal(); $data.reorderSections() })"
                class="p-1.5 rounded-md hover:bg-stone-200 dark:hover:bg-stone-600 text-stone-400 dark:text-stone-500 disabled:opacity-30"
                {{if eq .Index 0}}disabled{{end}}
            >
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path>
                </svg>
            </button>

            <!-- Move down -->
            <button
                @click.stop="$data.markLocalAction('sections_reordered'); fetch('/sections/{{.Section.ID}}/move-down', {method: 'POST'}).then(() => { $data.refreshManageSectionsModal(); $data.reorderSections() })"
                class="p-1.5 rounded-md hover:bg-stone-200 dark:hover:bg-stone-600 text-stone-400 dark:text-stone-500 disabled:opacity-30"
                {{if eq (add .Index 1) .Total}}disabled{{end}}
            >
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                </svg>
            </button>

            <!-- Delete -->
            <button
                @click.stop="if(confirm(t('confirm.delete_section', {name: '{{.Section.Name | js}}'}))) { $data.markLocalAction('section_deleted'); fetch('/sections/{{.Section.ID}}', {method: 'DELETE'}).then(() => { const el = document.getElementById('section-{{.Section.ID}}'); if (el) { Alpine.destroyTree(el); el.remove(); } window.checkEmptyStates(); $data.refreshManageSectionsModal(); $data.refreshSectionSelectsFromServer(); $data.refreshStats() }) }"
                class="p-1.5 rounded-md hover:bg-red-100 dark:hover:bg-red-900/30 text-stone-400 dark:text-stone-500 hover:text-red-500 dark:hover:text-red-400"
            >
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
    </template>
</div>
{{end}}
